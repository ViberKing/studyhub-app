<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1016"/>
      <stop offset="100%" stop-color="#0f0a0d"/>
    </linearGradient>
    <linearGradient id="book-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E11D48"/>
      <stop offset="100%" stop-color="#FB7185"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg-grad)"/>
  <!-- Glow behind book -->
  <circle cx="256" cy="256" r="140" fill="#E11D48" opacity="0.08"/>
  <g transform="translate(256,256)" stroke="none">
    <!-- Left page -->
    <path d="M-16,-90 C-16,-105 -28,-105 -40,-105 L-110,-105 C-125,-105 -130,-95 -130,-85 L-130,85 C-130,95 -125,105 -110,105 L-40,105 C-28,105 -16,95 -16,85 Z" fill="url(#book-grad)" opacity="0.9"/>
    <!-- Right page -->
    <path d="M16,-90 C16,-105 28,-105 40,-105 L110,-105 C125,-105 130,-95 130,-85 L130,85 C130,95 125,105 110,105 L40,105 C28,105 16,95 16,85 Z" fill="url(#book-grad)"/>
    <!-- Spine -->
    <rect x="-5" y="-105" width="10" height="210" rx="5" fill="#FB7185"/>
    <!-- Left page lines -->
    <line x1="-100" y1="-65" x2="-38" y2="-65" stroke="rgba(255,255,255,0.5)" stroke-width="5" stroke-linecap="round"/>
    <line x1="-100" y1="-35" x2="-45" y2="-35" stroke="rgba(255,255,255,0.4)" stroke-width="5" stroke-linecap="round"/>
    <line x1="-100" y1="-5" x2="-42" y2="-5" stroke="rgba(255,255,255,0.35)" stroke-width="5" stroke-linecap="round"/>
    <line x1="-100" y1="25" x2="-50" y2="25" stroke="rgba(255,255,255,0.3)" stroke-width="5" stroke-linecap="round"/>
    <line x1="-100" y1="55" x2="-45" y2="55" stroke="rgba(255,255,255,0.25)" stroke-width="5" stroke-linecap="round"/>
    <!-- Right page lines -->
    <line x1="38" y1="-65" x2="100" y2="-65" stroke="rgba(255,255,255,0.5)" stroke-width="5" stroke-linecap="round"/>
    <line x1="45" y1="-35" x2="100" y2="-35" stroke="rgba(255,255,255,0.4)" stroke-width="5" stroke-linecap="round"/>
    <line x1="42" y1="-5" x2="100" y2="-5" stroke="rgba(255,255,255,0.35)" stroke-width="5" stroke-linecap="round"/>
    <line x1="50" y1="25" x2="100" y2="25" stroke="rgba(255,255,255,0.3)" stroke-width="5" stroke-linecap="round"/>
    <line x1="45" y1="55" x2="100" y2="55" stroke="rgba(255,255,255,0.25)" stroke-width="5" stroke-linecap="round"/>
  </g>
</svg>
